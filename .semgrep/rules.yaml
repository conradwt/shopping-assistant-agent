rules:
  - id: detect-hardcoded-google-api-key
    languages:
      - python
    message: "Security Warning: A hardcoded Google API key or key prefix has been detected. API keys must be loaded securely from environment variables or a secrets manager, not committed to the repository."
    severity: ERROR
    pattern-regex: 'AIzaSy[A-Za-z0-9_\-]*'
